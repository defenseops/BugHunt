services:

  # ── Database ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: bughunt_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
      - pentra-scan-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Cache / Queue broker ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: bughunt_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - internal
      - pentra-scan-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI) ─────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bughunt_backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend:/app
      - reports_data:/app/reports
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Celery worker ─────────────────────────────────────────────────────
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bughunt_celery
    restart: unless-stopped
    # Handles non-scan tasks (report generation, etc.)
    command: celery -A app.worker worker --loglevel=info --queues=default,reports --concurrency=2
    env_file: .env
    environment:
      CELERY_WORKER: "true"
    volumes:
      - ./backend:/app
      - reports_data:/app/reports
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Scanner worker (Kali Linux, all pentest tools) ────────────────────
  # This worker DISPATCHES scans — each individual scan runs in its own
  # ephemeral container (pentra-scan-net) for isolation.
  # Falls back to in-process if Docker socket is not available.
  scanner:
    build:
      context: ./backend
      dockerfile: ../docker/scanner/Dockerfile
    container_name: bughunt_scanner
    restart: unless-stopped
    command: celery -A app.worker worker --loglevel=info --queues=scans --concurrency=4 --pool=prefork
    env_file: .env
    environment:
      CELERY_WORKER: "true"
      SCANNER_IMAGE: pentrascan-scanner:latest
      SCAN_NETWORK: pentra-scan-net
      MAX_PARALLEL_SCANS: "4"
      SCAN_CPU_LIMIT: "2"
      SCAN_MEM_LIMIT: "1g"
      SCAN_TIMEOUT_S: "3600"
    volumes:
      - ./backend:/app
      - reports_data:/app/reports
      - /var/run/docker.sock:/var/run/docker.sock  # needed to spawn scan containers
    networks:
      - internal
      - pentra-scan-net
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      msfrpcd:
        condition: service_started

  # ── Frontend (React) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bughunt_frontend
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      - backend

  # ── Nginx (reverse proxy) ─────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: bughunt_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ssl_certs:/etc/letsencrypt:ro
    networks:
      - internal
    depends_on:
      - backend
      - frontend

  # ── Metasploit RPC daemon ─────────────────────────────────────────────
  msfrpcd:
    build:
      context: ./docker/msfrpcd
      dockerfile: Dockerfile
    container_name: bughunt_msfrpcd
    restart: unless-stopped
    environment:
      MSF_RPC_USER: ${MSF_RPC_USER}
      MSF_RPC_PASS: ${MSF_RPC_PASS}
    networks:
      - internal
    volumes:
      - msf_data:/root/.msf4

volumes:
  postgres_data:
  redis_data:
  reports_data:
  ssl_certs:
  msf_data:

networks:
  internal:
    driver: bridge

  # Isolated network for ephemeral scan containers.
  # Containers on this network can reach postgres + redis but not the host.
  pentra-scan-net:
    driver: bridge
    internal: false   # scans need internet access to reach targets
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"   # containers talk to each other
    ipam:
      config:
        - subnet: 172.28.0.0/16
